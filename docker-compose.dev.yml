version: '3.8'

services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: weather-history-dynamodb
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    networks:
      - weather-history-network

  weather-api:
    image: amazon/aws-sam-cli-build-image-provided
    container_name: weather-history-api
    working_dir: /app
    volumes:
      - ./packages/weather-api:/app:ro
    ports:
      - "3000:3000"
    environment:
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - DYNAMODB_TABLE_NAME=weather-data
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
    command: sam local start-api --docker-network weather-history-network --port 3000
    networks:
      - weather-history-network
    depends_on:
      - dynamodb-local

  weather-ui:
    image: node:20-alpine
    container_name: weather-history-ui
    working_dir: /app
    volumes:
      - ./packages/weather-ui:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - weather-history-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  weather-history-network:
    driver: bridge