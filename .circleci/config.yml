version: 2.1

orbs:
  node: circleci/node@5.2.0
  aws-cli: circleci/aws-cli@4.1.3
  terraform: circleci/terraform@3.7.0

jobs:
  test:
    docker:
      - image: cimg/node:25.9
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: yarn install
      - run:
          name: Build shared packages
          command: |
            yarn workspace @weather-history/shared-types build
            yarn workspace @weather-history/shared-dynamodb-client build
      - run:
          name: Run tests
          command: |
            yarn workspace @weather-history/lambda-weather-extractor test
            yarn workspace @weather-history/lambda-weather-api test
            yarn workspace @weather-history/lambda-weather-checker test

  deploy-terraform-infra:
    docker:
      - image: cimg/node:25.9
    steps:
      - checkout
      - terraform/install:
          terraform_version: 1.14.8
      - aws-cli/setup:
          role_arn: ${OIDC_ROLE_ARN}
          region: us-east-1
          role_session_name: "circleci-terraform-deploy"
      - run:
          name: Create S3 placeholders for Lambda zip files
          command: |
            echo "placeholder" | aws s3 cp - s3://weather-history-lambda/lambda.zip || true
            echo "placeholder" | aws s3 cp - s3://weather-history-lambda/lambda-weather-api.zip || true
            echo "placeholder" | aws s3 cp - s3://weather-history-lambda/lambda-checker.zip || true
      - run:
          name: Terraform Init
          command: |
            terraform -chdir=terraform version
            terraform -chdir=terraform init -reconfigure -upgrade
            terraform -chdir=terraform providers
      - run:
          name: Terraform Apply Infrastructure
          command: |
            terraform -chdir=terraform apply \
              -target=aws_s3_bucket.lambda_code \
              -target=aws_s3_bucket.frontend \
              -target=aws_s3_bucket_ownership_controls.frontend \
              -target=aws_s3_bucket_public_access_block.frontend \
              -target=aws_s3_bucket_policy.frontend \
              -target=aws_s3_bucket_website_configuration.frontend \
              -target=aws_dynamodb_table.weather_data \
              -target=aws_iam_role.lambda_role \
              -target=aws_iam_policy.lambda_policy \
              -target=aws_iam_role_policy_attachment.lambda_policy_attachment \
              -target=aws_scheduler_schedule.each_territory \
              -target=aws_iam_role.scheduler_role \
              -target=aws_iam_role_policy.scheduler_policy \
              -target=aws_iam_role_policy_attachment.scheduler_policy_attachment \
              -target=aws_cloudwatch_log_group.lambda_logs \
              -target=aws_cloudfront_distribution.frontend \
              -var-file=terraform.tfvars \
              -var="notification_email=${NOTIFICATION_EMAIL}" \
              -var="cloudfront_alias=${CUSTOM_DOMAIN}" \
              -var="acm_certificate_arn=${ACM_CERTIFICATE_ARN}" \
              -auto-approve
      - run:
          name: Save CloudFront ID
          command: terraform -chdir=terraform output -raw frontend_distribution_id > /tmp/cloudfront_id.txt
      - persist_to_workspace:
          root: /tmp
          paths:
            - cloudfront_id.txt
          command: |
            terraform -chdir=terraform apply \
              -target=aws_s3_bucket.lambda_code \
              -target=aws_s3_bucket.frontend \
              -target=aws_s3_bucket_ownership_controls.frontend \
              -target=aws_s3_bucket_public_access_block.frontend \
              -target=aws_s3_bucket_policy.frontend \
              -target=aws_s3_bucket_website_configuration.frontend \
              -target=aws_dynamodb_table.weather_data \
              -target=aws_iam_role.lambda_role \
              -target=aws_iam_policy.lambda_policy \
              -target=aws_iam_role_policy_attachment.lambda_policy_attachment \
              -target=aws_scheduler_schedule.each_territory \
              -target=aws_iam_role.scheduler_role \
              -target=aws_iam_role_policy.scheduler_policy \
              -target=aws_iam_role_policy_attachment.scheduler_policy_attachment \
              -target=aws_cloudwatch_log_group.lambda_logs \
              -target=aws_cloudfront_distribution.frontend \
              -var-file=terraform.tfvars \
              -var="notification_email=${NOTIFICATION_EMAIL}" \
              -var="cloudfront_alias=${CUSTOM_DOMAIN}" \
              -var="acm_certificate_arn=${ACM_CERTIFICATE_ARN}" \
              -auto-approve

  upload-lambdas:
    docker:
      - image: cimg/node:25.9
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: yarn install
      - run:
          name: Build shared packages
          command: |
            yarn workspace @weather-history/shared-types build
            yarn workspace @weather-history/shared-dynamodb-client build
      - run:
          name: Build Lambda packages
          command: |
            cd packages/lambda-weather-extractor
            yarn build
            zip -r dist.zip dist/
            cd ../lambda-weather-api
            yarn build
            zip -r dist.zip dist/
            cd ../lambda-weather-checker
            yarn build
            zip -r dist.zip dist/
      - aws-cli/setup:
          role_arn: ${OIDC_ROLE_ARN}
          region: us-east-1
          role_session_name: "circleci-lambda-deploy"
      - run:
          name: Upload Lambda packages to S3
          command: |
            aws s3 cp packages/lambda-weather-extractor/dist.zip s3://weather-history-lambda/lambda.zip
            aws s3 cp packages/lambda-weather-api/dist.zip s3://weather-history-lambda/lambda-weather-api.zip
            aws s3 cp packages/lambda-weather-checker/dist.zip s3://weather-history-lambda/lambda-checker.zip

  deploy-lambda-extractor:
    docker:
      - image: cimg/node:25.9
    steps:
      - checkout
      - terraform/install:
          terraform_version: 1.14.8
      - aws-cli/setup:
          role_arn: ${OIDC_ROLE_ARN}
          region: us-east-1
          role_session_name: "circleci-terraform-deploy"
      - run:
          name: Terraform Init
          command: terraform -chdir=terraform init -reconfigure
      - run:
          name: Terraform Apply Lambda
          command: |
            terraform -chdir=terraform apply \
              -target=aws_lambda_function.weather_extractor \
              -target=aws_scheduler_schedule.each_territory \
              -target=aws_iam_role.scheduler_role \
              -target=aws_iam_role_policy.scheduler_policy \
              -target=aws_iam_role_policy_attachment.scheduler_policy_attachment \
              -var-file=terraform.tfvars \
              -var="notification_email=${NOTIFICATION_EMAIL}" \
              -var="cloudfront_alias=${CUSTOM_DOMAIN}" \
              -var="acm_certificate_arn=${ACM_CERTIFICATE_ARN}" \
              -auto-approve

  deploy-lambda-checker:
    docker:
      - image: cimg/node:25.9
    steps:
      - checkout
      - terraform/install:
          terraform_version: 1.14.8
      - aws-cli/setup:
          role_arn: ${OIDC_ROLE_ARN}
          region: us-east-1
          role_session_name: "circleci-terraform-deploy"
      - run:
          name: Terraform Init
          command: terraform -chdir=terraform init -reconfigure
      - run:
          name: Terraform Apply Lambda Checker
          command: |
            terraform -chdir=terraform apply \
              -target=aws_iam_role.lambda_checker_role \
              -target=aws_iam_policy.lambda_checker_policy \
              -target=aws_iam_role_policy_attachment.lambda_checker_policy_attachment \
              -target=aws_cloudwatch_log_group.lambda_checker_logs \
              -target=aws_lambda_function.weather_checker \
              -target=aws_scheduler_schedule.data_checker \
              -var-file=terraform.tfvars \
              -var="notification_email=${NOTIFICATION_EMAIL}" \
              -var="cloudfront_alias=${CUSTOM_DOMAIN}" \
              -var="acm_certificate_arn=${ACM_CERTIFICATE_ARN}" \
              -auto-approve

  deploy-lambda-api:
    docker:
      - image: cimg/node:25.9
    steps:
      - checkout
      - terraform/install:
          terraform_version: 1.14.8
      - aws-cli/setup:
          role_arn: ${OIDC_ROLE_ARN}
          region: us-east-1
          role_session_name: "circleci-terraform-deploy"
      - run:
          name: Terraform Init
          command: terraform -chdir=terraform init -reconfigure
      - run:
          name: Terraform Apply Lambda API
          command: |
            terraform -chdir=terraform apply \
              -target=aws_lambda_function.lambda_api \
              -target=aws_lambda_function_url.lambda_api \
              -target=aws_lambda_permission.api_url_public \
              -target=aws_lambda_permission.api_url_public_invoke \
              -target=aws_iam_role.lambda_api_role \
              -target=aws_iam_policy.lambda_api_policy \
              -target=aws_iam_role_policy_attachment.lambda_api_policy_attachment \
              -target=aws_cloudwatch_log_group.lambda_api_logs \
              -var-file=terraform.tfvars \
              -var="notification_email=${NOTIFICATION_EMAIL}" \
              -var="cloudfront_alias=${CUSTOM_DOMAIN}" \
              -var="acm_certificate_arn=${ACM_CERTIFICATE_ARN}" \
              -auto-approve
      - run:
          name: Get Lambda API URL
          command: |
            terraform -chdir=terraform output -raw lambda_api_url > /tmp/lambda_api_url.txt
      - persist_to_workspace:
          root: /tmp
          paths:
            - lambda_api_url.txt

  build-frontend:
    docker:
      - image: cimg/node:25.9
    steps:
      - checkout
      - attach_workspace:
          at: /tmp/workspace
      - run:
          name: Install dependencies
          command: yarn install
      - run:
          name: Build frontend
          command: |
            echo "VITE_API_URL=$(cat /tmp/workspace/lambda_api_url.txt)"
            cd /home/circleci/project/packages/weather-ui && VITE_API_URL=$(cat /tmp/workspace/lambda_api_url.txt) yarn build
      - run:
          name: Create archive
          command: |
            cd packages/weather-ui
            grep -r "VITE_API_URL" dist/ || echo "VITE_API_URL not found in dist"
            cat dist/index.html | grep -o "stations" || echo "API URL not in index.html"
            zip -r frontend.zip dist/
      - persist_to_workspace:
          root: packages/weather-ui
          paths:
            - frontend.zip
            - dist

  deploy-frontend:
    docker:
      - image: cimg/node:25.9
    steps:
      - checkout
      - attach_workspace:
          at: /tmp/workspace
      - aws-cli/setup:
          role_arn: ${OIDC_ROLE_ARN}
          region: us-east-1
          role_session_name: "circleci-frontend-deploy"
      - run:
          name: Upload frontend to S3
          command: |
            aws s3 cp /tmp/workspace/dist/index.html s3://weather-history-frontend/index.html \
              --content-type "text/html" \
              --cache-control "public, max-age=0, s-maxage=60, must-revalidate"
            aws s3 sync /tmp/workspace/dist/assets/ s3://weather-history-frontend/assets/ \
              --delete \
              --cache-control "public, max-age=31536000, immutable"

workflows:
  weather-history:
    jobs:
      - test:
          filters:
            branches:
              only: main
      - build-frontend:
          requires:
            - test
            - deploy-lambda-api
      - deploy-terraform-infra:
          requires:
            - test
          filters:
            branches:
              only: main
      - upload-lambdas:
          requires:
            - deploy-terraform-infra
          filters:
            branches:
              only: main
      - deploy-lambda-extractor:
          requires:
            - upload-lambdas
          filters:
            branches:
              only: main
      - deploy-lambda-checker:
          requires:
            - upload-lambdas
          filters:
            branches:
              only: main
      - deploy-lambda-api:
          requires:
            - upload-lambdas
          filters:
            branches:
              only: main
      - deploy-frontend:
          requires:
            - build-frontend
            - deploy-terraform-infra