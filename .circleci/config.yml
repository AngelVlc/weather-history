version: 2.1

orbs:
  node: circleci/node@5.2.0
  aws-cli: circleci/aws-cli@4.1.3
  terraform: circleci/terraform@3.7.0

jobs:
  test:
    docker:
      - image: cimg/node:25.9
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: yarn
      - run:
          name: Run tests
          command: yarn test
      - run:
          name: Build
          command: yarn build

  deploy-terraform:
    docker:
      - image: cimg/node:25.9
    steps:
      - checkout
      - terraform/install:
          terraform_version: 1.14.8
      - aws-cli/setup:
          role_arn: ${OIDC_ROLE_ARN}
          region: us-east-1
          role_session_name: "circleci-terraform-deploy"
      - run:
          name: Terraform Init
          command: terraform -chdir=terraform init -reconfigure
      - terraform/plan:
          path: terraform
          var_file: terraform.tfvars
      - terraform/apply:
          path: terraform
          var_file: terraform.tfvars

  deploy-lambda:
    docker:
      - image: cimg/node:25.9
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: yarn
      - run:
          name: Build Lambda package
          command: |
            yarn build
            cd packages/lambda-weather-extractor
            zip -r dist.zip dist/
      - aws-cli/setup:
          role_arn: ${OIDC_ROLE_ARN}
          region: us-east-1
          role_session_name: "circleci-lambda-deploy"
      - run:
          name: Upload to S3
          command: |
            aws s3 cp packages/lambda-weather-extractor/dist.zip s3://weather-history-lambda/lambda.zip

workflows:
  weather-history:
    jobs:
      - test:
          filters:
            branches:
              only: main
      - deploy-terraform:
          requires:
            - test
          filters:
            branches:
              only: main
      - deploy-lambda:
          requires:
            - test
            - deploy-terraform
          filters:
            branches:
              only: main
