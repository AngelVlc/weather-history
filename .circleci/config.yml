version: 2.1

orbs:
  node: circleci/node@5.2.0
  aws-cli: circleci/aws-cli@4.1.3
  terraform: circleci/terraform@3.7.0

jobs:
  test:
    docker:
      - image: cimg/node:25.9
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: yarn
      - run:
          name: Run tests
          command: |
            yarn workspace @weather-history/lambda-weather-extractor test
            yarn workspace @weather-history/lambda-weather-api test
      - run:
          name: Build
          command: yarn workspace @weather-history/lambda-weather-extractor build

  deploy-terraform-infra:
    docker:
      - image: cimg/node:25.9
    steps:
      - checkout
      - terraform/install:
          terraform_version: 1.14.8
      - aws-cli/setup:
          role_arn: ${OIDC_ROLE_ARN}
          region: us-east-1
          role_session_name: "circleci-terraform-deploy"
      - run:
          name: Terraform Init
          command: terraform -chdir=terraform init -reconfigure
      - run:
          name: Terraform Apply Infrastructure
          command: |
            terraform -chdir=terraform apply \
              -target=aws_s3_bucket.lambda_code \
              -target=aws_sqs_queue.dlq \
              -target=aws_dynamodb_table.weather_data \
              -target=aws_iam_role.lambda_role \
              -target=aws_iam_policy.lambda_policy \
              -target=aws_iam_role_policy_attachment.lambda_policy_attachment \
              -target=aws_cloudwatch_event_rule.each_territory \
              -target=aws_cloudwatch_log_group.lambda_logs \
              -target=aws_iam_role.dlq_processor_role \
              -target=aws_iam_role_policy.dlq_processor_ses_policy \
              -var-file=terraform.tfvars \
              -var="notification_email=${NOTIFICATION_EMAIL}" \
              -auto-approve

  deploy-lambda:
    docker:
      - image: cimg/node:25.9
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: yarn
      - run:
          name: Build Lambda packages
          command: |
            cd packages/lambda-weather-extractor
            yarn build
            zip -r dist.zip dist/
            cd ../dlq-processor
            yarn install
            yarn build
            zip -r dist.zip dist/
      - aws-cli/setup:
          role_arn: ${OIDC_ROLE_ARN}
          region: us-east-1
          role_session_name: "circleci-lambda-deploy"
      - run:
          name: Upload Lambda packages to S3
          command: |
            aws s3 cp packages/lambda-weather-extractor/dist.zip s3://weather-history-lambda/lambda.zip
            aws s3 cp packages/dlq-processor/dist.zip s3://weather-history-lambda/dlq-processor.zip

  deploy-terraform-lambda:
    docker:
      - image: cimg/node:25.9
    steps:
      - checkout
      - terraform/install:
          terraform_version: 1.14.8
      - aws-cli/setup:
          role_arn: ${OIDC_ROLE_ARN}
          region: us-east-1
          role_session_name: "circleci-terraform-deploy"
      - run:
          name: Terraform Init
          command: terraform -chdir=terraform init -reconfigure
      - run:
          name: Terraform Apply Lambda
          command: |
            terraform -chdir=terraform apply \
              -target=aws_lambda_function.weather_extractor \
              -target=aws_cloudwatch_event_target.lambda_target \
              -target=aws_lambda_permission.allow_eventbridge \
              -var-file=terraform.tfvars \
              -var="notification_email=${NOTIFICATION_EMAIL}" \
              -auto-approve

  deploy-terraform-dlq-processor:
    docker:
      - image: cimg/node:25.9
    steps:
      - checkout
      - terraform/install:
          terraform_version: 1.14.8
      - aws-cli/setup:
          role_arn: ${OIDC_ROLE_ARN}
          region: us-east-1
          role_session_name: "circleci-terraform-deploy"
      - run:
          name: Terraform Init
          command: terraform -chdir=terraform init -reconfigure
      - run:
          name: Terraform Apply DLQ Processor
          command: |
            terraform -chdir=terraform apply \
              -target=aws_lambda_function.dlq_processor \
              -target=aws_lambda_event_source_mapping.dlq_processor_trigger \
              -var-file=terraform.tfvars \
              -var="notification_email=${NOTIFICATION_EMAIL}" \
              -auto-approve

  build-frontend:
    docker:
      - image: cimg/node:25.9
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: yarn
      - run:
          name: Build frontend
          command: |
            cd packages/weather-ui
            yarn build
      - run:
          name: Create archive
          command: |
            cd packages/weather-ui
            zip -r frontend.zip dist/
      - persist_to_workspace:
          root: packages/weather-ui
          paths:
            - frontend.zip

  deploy-frontend:
    docker:
      - image: cimg/node:25.9
    steps:
      - checkout
      - attach_workspace:
          at: /tmp/workspace
      - aws-cli/setup:
          role_arn: ${OIDC_ROLE_ARN}
          region: us-east-1
          role_session_name: "circleci-frontend-deploy"
      - run:
          name: Upload frontend to S3
          command: |
            aws s3 cp /tmp/workspace/weather-ui/frontend.zip s3://weather-history-frontend/frontend.zip
            aws s3 sync /tmp/workspace/weather-ui/dist/ s3://weather-history-frontend/ --delete
      - run:
          name: Invalidate CloudFront cache
          command: |
            aws cloudfront create-invalidation --distribution-id $(aws cloudfront list-distributions --query "DistributionList.Items[?contains(Comment, 'weather-history-frontend')].Id" --output text) --paths "/*"

workflows:
  weather-history:
    jobs:
      - test:
          filters:
            branches:
              only: main
      - deploy-terraform-infra:
          requires:
            - test
          filters:
            branches:
              only: main
      - deploy-lambda:
          requires:
            - deploy-terraform-infra
          filters:
            branches:
              only: main
      - deploy-terraform-lambda:
          requires:
            - deploy-lambda
          filters:
            branches:
              only: main
      - deploy-terraform-dlq-processor:
          requires:
            - deploy-lambda
      - build-frontend:
          requires:
            - test
      - deploy-frontend:
          requires:
            - build-frontend
